<!DOCTYPE html>
<html>
<head>
<title>Blog | S Saurabh</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:system-ui;
background:#f5f6fb;
margin:0;
}
.container{
max-width:1000px;
margin:auto;
padding:40px;
}
input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:20px;
}
.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
.card img{
width:100%;
border-radius:10px;
}
.tag{
display:inline-block;
padding:4px 10px;
background:#eef3ff;
border-radius:20px;
font-size:12px;
margin-right:6px;
}
</style>
</head>
<body>
<div class="container">
<h1>Blog</h1>
<input id="search" placeholder="Search articles">
<div id="posts"></div>
</div>
<script>
const search=document.getElementById("search");
search.addEventListener("keyup",function(){
const term=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(term)?"block":"none";
});
});
</script>
</body>
</html>
